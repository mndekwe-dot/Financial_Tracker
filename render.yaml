services:
  - type: web
    name: financial-tracker
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: cd backend && gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the Render dashboard
